# Provide a complete list of UUIDs assosiated with the **Attacker** to /home/kali/.uuids
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS Professional | Generator</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #0d0d0d;
            --border: #1a1a1a;
            --text: #ffffff;
            --text-dim: #666666;
            --accent: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 40px;
            width: 100%;
            max-width: 1000px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 32px;
        }

        h2 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0 0 24px 0;
            color: var(--text-dim);
        }

        textarea {
            width: 100%;
            height: 200px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--text);
            padding: 16px;
            font-size: 15px;
            line-height: 1.5;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 24px;
            outline: none;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }

        .group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        select, input[type="range"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            font-size: 13px;
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 2px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn-main:disabled { opacity: 0.5; }

        .archive-list { display: flex; flex-direction: column; gap: 12px; }
        .archive-item { background: var(--bg); border: 1px solid var(--border); padding: 16px; }
        .archive-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; }
        .archive-text { font-size: 13px; color: #ccc; margin-bottom: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-sub { flex: 1; padding: 6px; background: transparent; border: 1px solid var(--border); color: var(--text-dim); font-size: 11px; cursor: pointer; text-decoration: none; text-align: center; }

        audio { width: 100%; margin-top: 24px; filter: invert(1); height: 30px; }
        #status { margin-top: 16px; font-size: 12px; color: var(--text-dim); text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div class="panel">
            <h2>System Input</h2>
            <textarea id="textInput" placeholder="Enter your text, choose your language/voice and press Generate"></textarea>
            
            <div class="controls">
                <div class="group">
                    <label>Locale</label>
                    <select id="langSelect">
                        <option value="en-us">English (US)</option>
                        <option value="en-gb">English (UK)</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="it">Italian</option>
                        <option value="ja">Japanese</option>
                        <option value="zh">Chinese</option>
                        <option value="pt-br">Portuguese</option>
                        <option value="hi">Hindi</option>
                    </select>
                </div>
                <div class="group">
                    <label>Voice</label>
                    <select id="voiceSelect"></select>
                </div>
                <div class="group">
                    <label>Tempo: <span id="speedVal">1.0</span>x</label>
                    <input type="range" id="speedRange" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>
            </div>

            <button id="generateBtn" class="btn-main">Generate Audio</button>
            <div id="status"></div>
            <audio id="audioPlayer" controls style="display:none;"></audio>
        </div>

        <div class="panel">
            <h2>Archive</h2>
            <div id="historyList" class="archive-list"></div>
        </div>
    </div>

    <script>
        const voicesData = {
            "en-us": [{ id: "af_bella", name: "Bella" }, { id: "af_sky", name: "Sky" }, { id: "am_michael", name: "Michael" }, { id: "am_adam", name: "Adam" }],
            "en-gb": [{ id: "bf_alice", name: "Alice" }, { id: "bm_george", name: "George" }],
            "es": [{ id: "ef_beta", name: "Female" }], "fr": [{ id: "ff_alpha", name: "Female" }],
            "de": [{ id: "gf_alpha", name: "Female" }], "it": [{ id: "if_alpha", name: "Female" }],
            "ja": [{ id: "jf_alpha", name: "Female" }], "zh": [{ id: "zf_alpha", name: "Female" }],
            "pt-br": [{ id: "pf_alpha", name: "Female" }], "hi": [{ id: "hf_alpha", name: "Female" }]
        };

        const generateBtn = document.getElementById('generateBtn');
        const textInput = document.getElementById('textInput');
        const langSelect = document.getElementById('langSelect');
        const voiceSelect = document.getElementById('voiceSelect');
        const speedRange = document.getElementById('speedRange');
        const speedVal = document.getElementById('speedVal');
        const audioPlayer = document.getElementById('audioPlayer');
        const status = document.getElementById('status');
        const historyList = document.getElementById('historyList');

        function updateVoices() {
            const lang = langSelect.value;
            voiceSelect.innerHTML = voicesData[lang]
                .map(v => `<option value="${v.id}">${v.name}</option>`)
                .join('');
        }

        langSelect.onchange = updateVoices;
        speedRange.oninput = () => speedVal.innerText = speedRange.value;
        updateVoices();

        async function loadArchive() {
            const resp = await fetch('http://localhost:8002/archive');
            if (resp.ok) {
                const data = await resp.json();
                historyList.innerHTML = '';
                data.forEach(item => addToHistory(item.text, item.voice, `http://localhost:8002/audio/${item.filename}`, false));
            }
        }

        generateBtn.onclick = async () => {
            const text = textInput.value;
            if (!text) return;
            generateBtn.disabled = true;
            status.innerText = "SYNTHESIZING...";
            try {
                const response = await fetch('http://localhost:8002/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, voice: voiceSelect.value, speed: parseFloat(speedRange.value), lang: langSelect.value })
                });
                const data = await response.json();
                const url = `http://localhost:8002/audio/${data.filename}`;
                audioPlayer.src = url;
                audioPlayer.style.display = "block";
                audioPlayer.play();
                addToHistory(text, voiceSelect.value, url);
                status.innerText = "READY";
            } catch (e) { status.innerText = "ERROR"; }
            finally { generateBtn.disabled = false; }
        };

        function addToHistory(text, voice, url, prepend = true) {
            const item = document.createElement('div');
            item.className = 'archive-item';
            const shortText = text.substring(0, 35) + (text.length > 35 ? "..." : "");
            item.innerHTML = `
                <div class="archive-meta"><span>${voice}</span></div>
                <div class="archive-text">"${shortText}"</div>
                <div class="archive-actions">
                    <button class="btn-sub" onclick="playHistory('${url}')">PLAY</button>
                    <a href="${url}" download="audio.wav" class="btn-sub">SAVE</a>
                </div>
            `;
            if (prepend) historyList.prepend(item); else historyList.appendChild(item);
        }

        window.playHistory = (url) => { audioPlayer.src = url; audioPlayer.play(); };
        loadArchive();
    </script>
</body>
</html>
